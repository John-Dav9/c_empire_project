<div class="admin-layout">
  <!-- Overlay mobile (backdrop) -->
  <div
    class="mobile-overlay"
    [class.show]="mobileMenuOpen()"
    (click)="closeMobileMenu()"
    aria-hidden="true"
  ></div>

  <!-- Header mobile (uniquement visible sur petit écran) -->
  <header class="mobile-header">
    <button
      class="mobile-menu-btn"
      (click)="toggleMobileMenu()"
      [attr.aria-label]="mobileMenuOpen() ? 'Fermer le menu' : 'Ouvrir le menu'"
      [attr.aria-expanded]="mobileMenuOpen()"
    >
      {{ mobileMenuOpen() ? '✕' : '☰' }}
    </button>
    <span class="mobile-title">C'EMPIRE Admin</span>
  </header>

  <!-- Sidebar -->
  <aside
    class="sidebar"
    [class.collapsed]="sidebarCollapsed()"
    [class.mobile-open]="mobileMenuOpen()"
  >
    <div class="sidebar-header">
      @if (!sidebarCollapsed()) {
        <h2>C'EMPIRE</h2>
      }
      <button
        class="toggle-btn"
        (click)="toggleSidebar()"
        [attr.aria-label]="sidebarCollapsed() ? 'Ouvrir le menu' : 'Réduire le menu'"
        [attr.aria-expanded]="!sidebarCollapsed()"
      >
        {{ sidebarCollapsed() ? '☰' : '✕' }}
      </button>
    </div>

    <nav class="sidebar-nav" aria-label="Navigation admin">
      @for (item of visibleNavItems; track item.route) {
        <a
          [routerLink]="item.route"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: false }"
          class="nav-link"
          [attr.title]="sidebarCollapsed() ? item.label : null"
          (click)="closeMobileMenu()"
        >
          <span class="nav-icon" aria-hidden="true">{{ item.icon }}</span>
          @if (!sidebarCollapsed()) {
            <span class="nav-label">{{ item.label }}</span>
          }
        </a>
      }
    </nav>

    @if (!sidebarCollapsed()) {
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" aria-hidden="true">{{ userInitial }}</div>
          <div class="user-details">
            <div class="user-email">{{ currentUser?.email }}</div>
            <div class="user-role">{{ isSuperAdmin ? 'Super Admin' : 'Admin' }}</div>
          </div>
        </div>
        <button class="logout-btn" (click)="logout()">
          🚪 Déconnexion
        </button>
      </div>
    }
  </aside>

  <!-- Main Content -->
  <main class="main-content" [class.expanded]="sidebarCollapsed()">
    <router-outlet />
  </main>
</div>
