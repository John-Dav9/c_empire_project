<div class="admin-layout">
  <!-- Sidebar -->
  <aside class="sidebar" [class.collapsed]="sidebarCollapsed">
    <div class="sidebar-header">
      <h2 *ngIf="!sidebarCollapsed">C'EMPIRE</h2>
      <button class="toggle-btn" (click)="toggleSidebar()">
        {{ sidebarCollapsed ? '☰' : '✕' }}
      </button>
    </div>

    <nav class="sidebar-nav">
      <a *ngFor="let item of getVisibleNavItems()" 
         [routerLink]="item.route" 
         routerLinkActive="active"
         [routerLinkActiveOptions]="{exact: false}"
         class="nav-link">
        <span class="nav-icon">{{ item.icon }}</span>
        <span class="nav-label" *ngIf="!sidebarCollapsed">{{ item.label }}</span>
      </a>
    </nav>

    <div class="sidebar-footer" *ngIf="!sidebarCollapsed">
      <div class="user-info">
        <div class="user-avatar">{{ (currentUser?.email || 'U').charAt(0).toUpperCase() }}</div>
        <div class="user-details">
          <div class="user-email">{{ currentUser?.email }}</div>
          <div class="user-role">{{ isSuperAdmin ? 'Super Admin' : 'Admin' }}</div>
        </div>
      </div>
      <button class="logout-btn" (click)="logout()">
        🚪 Déconnexion
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content page-enter" [class.expanded]="sidebarCollapsed">
    <router-outlet></router-outlet>
  </main>
</div>
