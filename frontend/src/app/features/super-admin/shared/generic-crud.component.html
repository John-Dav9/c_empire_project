<div class="crud-container page-enter">
  <div class="header">
    <h1>{{ config.icon }} {{ config.title }}</h1>
    <button class="btn btn-primary" (click)="openAddModal()">
      ➕ Ajouter
    </button>
  </div>

  <div *ngIf="loading" class="loading">
    <div class="spinner"></div>
    <p>Chargement...</p>
  </div>

  <div *ngIf="error" class="alert alert-error">{{ error }}</div>

  <div *ngIf="!loading" class="table-container app-shell-card">
    <table class="data-table">
      <thead>
        <tr>
          <th *ngFor="let field of config.displayFields">
            {{ getFieldLabel(field) }}
          </th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of items">
          <td *ngFor="let field of config.displayFields">
            {{ getValue(item, field) }}
          </td>
          <td class="actions">
            <button class="btn-icon" (click)="editItem(item)">✏️</button>
            <button class="btn-icon" (click)="deleteItem(item[config.idField || 'id'])">🗑️</button>
          </td>
        </tr>
      </tbody>
    </table>

    <div *ngIf="items.length === 0" class="empty-state">
      <p>Aucun élément trouvé</p>
      <button class="btn btn-primary" (click)="openAddModal()">Ajouter le premier élément</button>
    </div>
  </div>

  <!-- Modal -->
  <div *ngIf="showModal" class="modal-overlay" (click)="showModal = false">
    <div class="modal" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h2>{{ editingItem ? '✏️ Modifier' : '➕ Nouveau' }}</h2>
        <button class="close-btn" (click)="showModal = false">✕</button>
      </div>
      <form (ngSubmit)="saveItem()" class="modal-body">
        <div *ngFor="let field of config.fields" class="form-group">
          <label>
            {{ field.label }}
            <span *ngIf="field.required" class="required">*</span>
          </label>

          <input *ngIf="field.type === 'text' || field.type === 'url'"
                 [(ngModel)]="formData[field.name]"
                 [name]="field.name"
                 [required]="!!field.required"
                 class="form-control">

          <input *ngIf="field.type === 'number'"
                 type="number"
                 [(ngModel)]="formData[field.name]"
                 [name]="field.name"
                 [required]="!!field.required"
                 class="form-control">

          <textarea *ngIf="field.type === 'textarea'"
                    [(ngModel)]="formData[field.name]"
                    [name]="field.name"
                    [required]="!!field.required"
                    class="form-control"
                    rows="3"></textarea>

          <div *ngIf="field.type === 'url-list'" class="url-list">
            <div
              class="url-list-row"
              *ngFor="let url of formData[field.name]; let i = index"
            >
              <input
                type="url"
                [(ngModel)]="formData[field.name][i]"
                [name]="field.name + '-' + i"
                [required]="!!field.required && i === 0"
                class="form-control"
                placeholder="https://exemple.com/image.jpg"
              />
              <button
                type="button"
                class="btn btn-secondary btn-icon-text"
                (click)="removeUrlField(field.name, i)"
                title="Supprimer cette URL"
              >
                −
              </button>
            </div>

            <button
              type="button"
              class="btn btn-primary btn-add-url"
              (click)="addUrlField(field.name)"
            >
              + Ajouter une image
            </button>
          </div>

          <div *ngIf="field.type === 'file-list'" class="url-list">
            <div class="file-upload-row">
              <input
                type="file"
                multiple
                accept="image/*"
                (change)="onFilesSelected(field.name, $event)"
                class="form-control"
              />
              <span class="uploading-hint" *ngIf="uploadingFiles">Upload...</span>
            </div>

            <div
              class="url-list-row"
              *ngFor="let filePath of formData[field.name]; let i = index"
            >
              <input
                type="text"
                [ngModel]="filePath"
                [name]="field.name + '-file-' + i"
                readonly
                class="form-control"
              />
              <button
                type="button"
                class="btn btn-secondary btn-icon-text"
                (click)="removeListItem(field.name, i)"
                title="Retirer cette image"
              >
                −
              </button>
            </div>
          </div>

          <select *ngIf="field.type === 'select'"
                  [(ngModel)]="formData[field.name]"
                  [name]="field.name"
                  [required]="!!field.required"
                  class="form-control">
            <option value="">Sélectionner...</option>
            <option *ngFor="let opt of field.options" [value]="opt.value">
              {{ opt.label }}
            </option>
          </select>

          <label *ngIf="field.type === 'checkbox'" class="checkbox-label">
            <input type="checkbox"
                   [(ngModel)]="formData[field.name]"
                   [name]="field.name">
            {{ field.label }}
          </label>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" (click)="showModal = false">
            Annuler
          </button>
          <button type="submit" class="btn btn-primary" [disabled]="saving || uploadingFiles">
            {{ saving ? 'Enregistrement...' : 'Enregistrer' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
