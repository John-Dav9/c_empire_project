<div class="employee-dashboard page-enter">
  <div class="header">
    <h1>Tableau de bord Employé</h1>
    <p class="subtitle">Gérez vos tâches et votre activité</p>
  </div>

  <div class="cards-grid">
    <div class="card app-shell-card">
      <div class="card-icon">📋</div>
      <h3>Mes Tâches</h3>
      <p>Consultez et mettez à jour vos tâches assignées</p>
      <button class="btn btn-primary">Voir mes tâches</button>
    </div>

    <div class="card app-shell-card">
      <div class="card-icon">🏢</div>
      <h3>Mon Secteur</h3>
      <p>Informations sur votre secteur d'activité</p>
      <button class="btn btn-primary">Voir mon secteur</button>
    </div>

    <div class="card app-shell-card">
      <div class="card-icon">📊</div>
      <h3>Statistiques</h3>
      <p>Visualisez vos performances</p>
      <button class="btn btn-primary">Voir mes stats</button>
    </div>

    <div class="card app-shell-card">
      <div class="card-icon">👤</div>
      <h3>Mon Profil</h3>
      <p>Gérez vos informations personnelles</p>
      <button class="btn btn-primary">Modifier mon profil</button>
    </div>
  </div>
</div>
