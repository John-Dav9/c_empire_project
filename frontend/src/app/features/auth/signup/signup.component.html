<div class="signup-container">
  <div class="mesh one"></div>
  <div class="mesh two"></div>

  <mat-card class="signup-card app-shell-card page-enter">
    <div class="logo-section">
      <div class="brand-video-wrap">
        <video
          #brandVideo
          class="brand-video"
          autoplay
          loop
          muted
          playsinline
          preload="auto"
          disablePictureInPicture
          disableRemotePlayback
          aria-label="Logo animé C'EMPIRE"
        >
          <source src="/media/brand-loop.mp4" type="video/mp4" />
        </video>
      </div>
      <h1 class="brand-name">C'EMPIRE</h1>
      <p class="brand-subtitle">Création de compte</p>
    </div>

    <div class="auth-head">
      <h2>Créer un Compte</h2>
      <p class="subtitle">Inscrivez-vous en quelques secondes</p>
    </div>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="name-row">
          <mat-form-field appearance="outline" class="half-width">
            <mat-label>Prénom</mat-label>
            <input matInput formControlName="firstName" />
            <mat-error *ngIf="form.get('firstName')?.hasError('required')">
              Prénom requis
            </mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline" class="half-width">
            <mat-label>Nom</mat-label>
            <input matInput formControlName="lastName" />
            <mat-error *ngIf="form.get('lastName')?.hasError('required')">
              Nom requis
            </mat-error>
          </mat-form-field>
        </div>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" />
          <mat-error *ngIf="form.get('email')?.hasError('required')">
            Email requis
          </mat-error>
          <mat-error *ngIf="form.get('email')?.hasError('email')">
            Email invalide
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Mot de passe</mat-label>
          <mat-icon matPrefix>lock</mat-icon>
          <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password" />
          <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="form.get('password')?.hasError('required')">
            Mot de passe requis
          </mat-error>
          <mat-error *ngIf="form.get('password')?.hasError('minlength')">
            Minimum 6 caractères
          </mat-error>
        </mat-form-field>

        <button mat-raised-button color="primary" class="signup-button" [disabled]="form.invalid || loading" type="submit">
          <span *ngIf="!loading">S'inscrire</span>
          <mat-spinner *ngIf="loading" diameter="20"></mat-spinner>
        </button>

        <div class="divider">
          <span>Vous avez déjà un compte?</span>
        </div>

        <button mat-stroked-button class="signin-button" (click)="goToSignin()" type="button">
          Se connecter
        </button>

        <div *ngIf="error" class="error-message">
          <span>{{ error }}</span>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
