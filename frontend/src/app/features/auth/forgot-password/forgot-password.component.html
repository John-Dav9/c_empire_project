<div class="auth-shell">
  <div class="mesh one"></div>
  <div class="mesh two"></div>

  <mat-card class="auth-card app-shell-card page-enter">
    <div class="logo-section">
      <div class="brand-video-wrap">
        <img class="brand-video" src="/media/logos/cempire-log.jpg" alt="Logo C'EMPIRE" loading="lazy" />
      </div>
      <h1 class="brand-name">C'EMPIRE</h1>
      <p class="brand-subtitle">Récupération de compte</p>
    </div>

    <div class="auth-head">
      <h2>Mot de passe oublié</h2>
      <p class="subtitle">Saisis ton email pour recevoir un lien de réinitialisation.</p>
    </div>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <mat-icon matPrefix>mail</mat-icon>
          <input matInput type="email" formControlName="email" />
          <mat-error *ngIf="form.get('email')?.hasError('required')">Email requis</mat-error>
          <mat-error *ngIf="form.get('email')?.hasError('email')">Email invalide</mat-error>
        </mat-form-field>

        <button mat-raised-button color="primary" class="primary-button" [disabled]="form.invalid || loading" type="submit">
          <span *ngIf="!loading">Envoyer le lien</span>
          <mat-spinner *ngIf="loading" diameter="20"></mat-spinner>
        </button>

        <p class="auth-link">
          <a routerLink="/auth/signin">Retour à la connexion</a>
        </p>

        <div *ngIf="success" class="success-message">
          <mat-icon>mark_email_read</mat-icon>
          <span>{{ success }}</span>
        </div>

        <div *ngIf="devResetUrl" class="info-message">
          <mat-icon>construction</mat-icon>
          <span>Transport email non configuré localement.</span>
          <button mat-stroked-button type="button" (click)="openDevResetUrl()">Ouvrir le lien de test</button>
        </div>

        <div *ngIf="error" class="error-message">
          <mat-icon>error</mat-icon>
          <span>{{ error }}</span>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
